<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2d5a27">
  <title>Carte forestière</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
    #map{height:100vh;width:100vw;background:#f0ebe3;}

    #topbar{
      position:fixed;top:0;left:0;right:0;z-index:1000;
      background:#2d5a27;color:white;
      padding:0 14px;display:flex;align-items:center;justify-content:space-between;
      height:50px;box-shadow:0 2px 8px rgba(0,0,0,0.3);
    }
    #topbar h1{font-size:15px;font-weight:700;}
    #gps-pill{
      display:flex;align-items:center;gap:6px;
      background:rgba(255,255,255,0.15);
      padding:4px 10px;border-radius:20px;font-size:12px;
    }
    #gps-dot{width:8px;height:8px;border-radius:50%;background:#aaa;transition:background 0.3s;}
    #gps-dot.on{background:#4cff72;animation:blink 1.5s infinite;}
    #gps-dot.searching{background:#ffcc00;animation:blink 1s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

    #toolbar{
      position:fixed;bottom:0;left:0;right:0;z-index:1000;
      background:white;padding:8px 8px 22px;
      display:flex;gap:6px;
      box-shadow:0 -2px 12px rgba(0,0,0,0.12);
    }
    .tbtn{
      flex:1;border:none;border-radius:10px;
      padding:10px 4px 8px;
      display:flex;flex-direction:column;align-items:center;gap:3px;
      cursor:pointer;font-size:11px;font-weight:600;color:#444;
      background:#f3f3f3;transition:all 0.15s;position:relative;
    }
    .tbtn:active{transform:scale(0.93);}
    .tbtn .ico{font-size:18px;line-height:1;}
    .tbtn.green{background:#2d5a27;color:white;}
    .tbtn.active{background:#2d5a27;color:white;}
    .tbtn.recording{background:#c62828;color:white;}
    .tbtn:disabled{opacity:0.35;pointer-events:none;}
    .badge{
      position:absolute;top:-5px;right:-3px;
      background:#e53935;color:white;
      border-radius:10px;font-size:10px;font-weight:700;
      padding:1px 5px;display:none;
    }

    #infobox{
      position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
      z-index:999;background:rgba(0,0,0,0.72);color:white;
      padding:8px 18px;border-radius:22px;
      font-size:13px;font-weight:600;white-space:nowrap;display:none;
    }
    #toast{
      position:fixed;top:62px;left:50%;transform:translateX(-50%);
      z-index:2000;background:rgba(0,0,0,0.72);color:white;
      padding:7px 18px;border-radius:20px;font-size:13px;
      opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;
    }
    #toast.show{opacity:1;}
    #rec-bar{
      position:fixed;top:50px;left:0;right:0;z-index:997;
      background:#c62828;color:white;
      padding:5px 16px;font-size:13px;font-weight:700;
      display:none;align-items:center;justify-content:center;gap:10px;
    }
    #rec-bar.show{display:flex;}
    #rec-dot{width:10px;height:10px;border-radius:50%;background:white;animation:blink 0.8s infinite;}

    /* MODALS */
    .modal-overlay{
      display:none;position:fixed;inset:0;z-index:3000;
      background:rgba(0,0,0,0.55);
      align-items:flex-end;justify-content:center;
    }
    .modal-overlay.show{display:flex;}
    .modal{
      background:white;border-radius:20px 20px 0 0;
      padding:24px 20px 36px;width:100%;max-width:500px;
    }
    .modal h2{font-size:16px;font-weight:700;color:#2d5a27;margin-bottom:16px;}
    .modal label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px;}
    .modal input,.modal textarea{
      width:100%;border:1.5px solid #ddd;border-radius:10px;
      padding:10px 12px;font-size:15px;margin-bottom:14px;
      font-family:inherit;
    }
    .modal textarea{height:80px;resize:none;}
    .modal input:focus,.modal textarea:focus{border-color:#2d5a27;outline:none;}
    .modal-btns{display:flex;gap:10px;margin-top:4px;}
    .modal-btns button{
      flex:1;padding:13px;border:none;border-radius:12px;
      font-size:15px;font-weight:700;cursor:pointer;
    }
    .btn-cancel{background:#f0f0f0;color:#666;}
    .btn-confirm{background:#2d5a27;color:white;}

    /* LINE MODE CHOICE */
    #line-choice-overlay{
      display:none;position:fixed;inset:0;z-index:3000;
      background:rgba(0,0,0,0.55);
      align-items:flex-end;justify-content:center;
    }
    #line-choice-overlay.show{display:flex;}
    #line-choice{
      background:white;border-radius:20px 20px 0 0;
      padding:24px 20px 36px;width:100%;max-width:500px;
    }
    #line-choice h2{font-size:16px;font-weight:700;color:#2d5a27;margin-bottom:6px;}
    #line-choice p{font-size:13px;color:#777;margin-bottom:20px;}
    .choice-btn{
      width:100%;padding:16px;border:2px solid #e0e0e0;border-radius:14px;
      background:white;margin-bottom:10px;cursor:pointer;
      display:flex;align-items:center;gap:14px;text-align:left;
    }
    .choice-btn:active{background:#f5f5f5;}
    .choice-btn .choice-ico{font-size:28px;}
    .choice-btn .choice-txt strong{display:block;font-size:15px;font-weight:700;color:#222;}
    .choice-btn .choice-txt span{font-size:12px;color:#777;}
    .btn-cancel-choice{
      width:100%;padding:13px;border:none;border-radius:12px;
      background:#f0f0f0;color:#666;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;
    }

    .leaflet-control-zoom{display:none;}
  </style>
</head>
<body>

<div id="topbar">
  <h1>🌲 Carte forestière</h1>
  <div id="gps-pill">
    <div id="gps-dot"></div>
    <span id="gps-txt">GPS...</span>
  </div>
</div>

<div id="map"></div>
<div id="infobox"></div>
<div id="toast"></div>
<div id="rec-bar"><div id="rec-dot"></div><span id="rec-txt">Enregistrement...</span></div>

<div id="toolbar">
  <button class="tbtn green" onclick="centerOnMe()">
    <span class="ico">📍</span>Position
  </button>
  <button class="tbtn" id="btn-point" onclick="setMode('point')">
    <span class="badge" id="badge-point"></span>
    <span class="ico">📌</span>Point
  </button>
  <button class="tbtn" id="btn-track" onclick="openLineChoice()">
    <span class="ico">🔴</span><span id="track-label">Ligne</span>
  </button>
  <button class="tbtn" id="btn-dist" onclick="setMode('dist')">
    <span class="ico">📏</span>Distance
  </button>
  <button class="tbtn" id="btn-area" onclick="setMode('area')">
    <span class="ico">📐</span>Surface
  </button>
  <button class="tbtn" id="btn-export" onclick="exportGPX()" disabled>
    <span class="ico">📤</span>Export
  </button>
  <button class="tbtn" id="btn-clear" onclick="clearAllData()" style="flex:0.6;">
    <span class="ico">🗑️</span>Effacer
  </button>
</div>

<!-- MODAL POINT -->
<div class="modal-overlay" id="point-modal">
  <div class="modal">
    <h2>📌 Nouveau point</h2>
    <label>Nom</label>
    <input type="text" id="pt-name" placeholder="ex: Arbre malade, Accès, Chevreuil...">
    <label>Commentaire (optionnel)</label>
    <textarea id="pt-comment" placeholder="Notes supplémentaires..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cancelPoint()">Annuler</button>
      <button class="btn-confirm" onclick="confirmPoint()">Épingler</button>
    </div>
  </div>
</div>

<!-- MODAL LIGNE (nom + commentaire) -->
<div class="modal-overlay" id="line-modal">
  <div class="modal">
    <h2>🔴 Nouvelle ligne</h2>
    <label>Nom</label>
    <input type="text" id="ln-name" placeholder="ex: Sentier nord, Limite de coupe...">
    <label>Commentaire (optionnel)</label>
    <textarea id="ln-comment" placeholder="Notes supplémentaires..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cancelLine()">Annuler</button>
      <button class="btn-confirm" onclick="confirmLine()">Démarrer</button>
    </div>
  </div>
</div>

<!-- CHOIX MODE LIGNE -->
<div id="line-choice-overlay">
  <div id="line-choice">
    <h2>🔴 Tracer une ligne</h2>
    <p>Comment voulez-vous tracer votre ligne?</p>
    <button class="choice-btn" onclick="selectLineMode('gps')">
      <span class="choice-ico">🚶</span>
      <div class="choice-txt">
        <strong>GPS automatique</strong>
        <span>Marchez et la ligne se trace en temps réel</span>
      </div>
    </button>
    <button class="choice-btn" onclick="selectLineMode('manual')">
      <span class="choice-ico">👆</span>
      <div class="choice-txt">
        <strong>Manuel (tap par tap)</strong>
        <span>Tapez chaque point de la ligne sur la carte</span>
      </div>
    </button>
    <button class="btn-cancel-choice" onclick="closeLineChoice()">Annuler</button>
  </div>
</div>

// MAP INIT
const map = L.map('map', {center:[46.218,-70.4938], zoom:17, zoomControl:false, attributionControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom:19, opacity:0.35}).addTo(map);
const customLayer = L.tileLayer('', {maxZoom:18, minZoom:10});
customLayer.createTile = function(coords, done) {
  const img = document.createElement('img');
  const key = coords.z+'/'+coords.x+'/'+coords.y;
  const b64 = TILES[key];
  if (b64) {
    img.src = 'data:image/png;base64,'+b64;
    img.onload = () => done(null, img);
    img.onerror = () => done('error', img);
  } else {
    img.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQAABjE+ibYAAAAASUVORK5CYII=';
    done(null, img);
  }
  return img;
};
customLayer.addTo(map);
map.fitBounds([[46.2172,-70.4947],[46.2189,-70.493]]);

// STATE
let mode = null;
let lastPos = null;
let userMarker = null, userCircle = null;
let points = [], tracks = [];
let trackActive = false, trackMode = null; // 'gps' or 'manual'
let trackCoords = [], trackPolyline = null;
let manualLineMarkers = [];
let distCoords = [], distMarkers = [], distPolyline = null;
let areaCoords = [], areaMarkers = [], areaPolyline = null, areaPolygon = null;
let pendingPointLatLng = null;
let pendingLineMode = null;

// GPS
document.getElementById('gps-dot').className = 'searching';
document.getElementById('gps-txt').textContent = 'Recherche...';
navigator.geolocation && navigator.geolocation.watchPosition(pos => {
  const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
  lastPos = {lat, lng, acc};
  document.getElementById('gps-dot').className = 'on';
  document.getElementById('gps-txt').textContent = '±'+Math.round(acc)+'m';
  const ll = L.latLng(lat, lng);
  if (!userMarker) {
    userMarker = L.circleMarker(ll, {radius:8,color:'#1565C0',weight:3,fillColor:'#1e88e5',fillOpacity:1}).addTo(map);
    userCircle = L.circle(ll, {radius:acc,color:'#1e88e5',weight:1,fillOpacity:0.08}).addTo(map);
  } else { userMarker.setLatLng(ll); userCircle.setLatLng(ll); userCircle.setRadius(acc); }
  if (trackActive && trackMode === 'gps') {
    const last = trackCoords[trackCoords.length-1];
    if (haversine(last[0],last[1],lat,lng) >= 3) {
      trackCoords.push([lat,lng]);
      trackPolyline.setLatLngs(trackCoords);
      document.getElementById('rec-txt').textContent = 'Ligne : '+formatDist(totalDist(trackCoords));
    }
  }
}, () => {
  document.getElementById('gps-dot').className = '';
  document.getElementById('gps-txt').textContent = 'Erreur GPS';
}, {enableHighAccuracy:true, maximumAge:2000, timeout:15000});

function centerOnMe() {
  if (lastPos) map.flyTo([lastPos.lat,lastPos.lng],17,{duration:1});
  else showToast('GPS pas encore prêt...');
}

// MODES
function setMode(m) {
  if (mode === m) { clearMeasure(); mode=null; updateBtns(); hideInfo(); return; }
  clearMeasure(); mode=m; updateBtns();
  const tips = {point:'Tapez sur la carte pour épingler', dist:'Tapez pour mesurer une distance', area:'Tapez les coins — double-tapez pour terminer'};
  showToast(tips[m]);
}

function updateBtns() {
  ['point','dist','area'].forEach(m => document.getElementById('btn-'+m).classList.toggle('active', mode===m));
  const trackBtn = document.getElementById('btn-track');
  trackBtn.classList.toggle('recording', trackActive);
  document.getElementById('track-label').textContent = trackActive ? 'Stop' : 'Ligne';
}

// LINE CHOICE
function openLineChoice() {
  if (trackActive) { stopTrack(); return; }
  document.getElementById('line-choice-overlay').classList.add('show');
}
function closeLineChoice() {
  document.getElementById('line-choice-overlay').classList.remove('show');
}
function selectLineMode(m) {
  closeLineChoice();
  pendingLineMode = m;
  // Show line name/comment modal
  document.getElementById('ln-name').value = '';
  document.getElementById('ln-comment').value = '';
  document.getElementById('line-modal').classList.add('show');
  setTimeout(() => document.getElementById('ln-name').focus(), 300);
}
function cancelLine() {
  document.getElementById('line-modal').classList.remove('show');
  pendingLineMode = null;
}
function confirmLine() {
  document.getElementById('line-modal').classList.remove('show');
  const name = document.getElementById('ln-name').value.trim() || ('Ligne '+(tracks.length+1));
  const comment = document.getElementById('ln-comment').value.trim();
  startTrack(pendingLineMode, name, comment);
  pendingLineMode = null;
}

// TRACK
let currentTrackMeta = {};
function startTrack(tMode, name, comment) {
  if (tMode === 'gps' && !lastPos) { showToast('GPS pas encore prêt...'); return; }
  trackActive = true;
  trackMode = tMode;
  currentTrackMeta = {name, comment};
  mode = null; updateBtns();
  trackCoords = tMode === 'gps' ? [[lastPos.lat,lastPos.lng]] : [];
  trackPolyline = L.polyline(trackCoords, {color:'#e53935',weight:4,opacity:0.85}).addTo(map);
  if (tMode === 'gps') {
    document.getElementById('rec-bar').classList.add('show');
    showToast('Enregistrement GPS — marchez!');
  } else {
    showToast('Tapez sur la carte pour tracer la ligne');
  }
  updateBtns();
}

function stopTrack() {
  trackActive = false;
  document.getElementById('rec-bar').classList.remove('show');
  manualLineMarkers.forEach(m => map.removeLayer(m));
  manualLineMarkers = [];
  if (trackCoords.length >= 2) {
    tracks.push({coords:[...trackCoords], name:currentTrackMeta.name, comment:currentTrackMeta.comment});
    showToast(currentTrackMeta.name+' sauvegardée — '+formatDist(totalDist(trackCoords)));
    checkExport(); saveData();
  } else {
    showToast('Pas assez de points');
    if (trackPolyline) { map.removeLayer(trackPolyline); trackPolyline=null; }
  }
  trackCoords = []; trackPolyline = null;
  updateBtns();
}

// MAP CLICK
map.on('click', e => {
  // Ligne manuelle — priorité absolue
  if (trackActive && trackMode === 'manual') {
    trackCoords.push([e.latlng.lat, e.latlng.lng]);
    trackPolyline.setLatLngs(trackCoords);
    const m = L.circleMarker(e.latlng, {radius:5,color:'#e53935',fillColor:'#e53935',fillOpacity:1,weight:2}).addTo(map);
    manualLineMarkers.push(m);
    showInfo('🔴 '+trackCoords.length+' point(s) — '+formatDist(totalDist(trackCoords))+' — double-tapez pour terminer');
  } else if (mode === 'point') {
    pendingPointLatLng = e.latlng;
    document.getElementById('pt-name').value = '';
    document.getElementById('pt-comment').value = '';
    document.getElementById('point-modal').classList.add('show');
    setTimeout(() => document.getElementById('pt-name').focus(), 300);
  } else if (mode === 'dist') {
    distCoords.push([e.latlng.lat,e.latlng.lng]);
    distMarkers.push(L.circleMarker(e.latlng,{radius:6,color:'#e65100',fillColor:'#ff6f00',fillOpacity:1,weight:2}).addTo(map));
    if (distPolyline) map.removeLayer(distPolyline);
    if (distCoords.length>1) { distPolyline=L.polyline(distCoords,{color:'#ff6f00',weight:3,dashArray:'8,5'}).addTo(map); showInfo('📏 '+formatDist(totalDist(distCoords))); }
    else showInfo('📏 Tapez un 2e point');
  } else if (mode === 'area') {
    areaCoords.push([e.latlng.lat,e.latlng.lng]);
    areaMarkers.push(L.circleMarker(e.latlng,{radius:6,color:'#4a148c',fillColor:'#7b1fa2',fillOpacity:1,weight:2}).addTo(map));
    if (areaPolyline) map.removeLayer(areaPolyline);
    if (areaPolygon) map.removeLayer(areaPolygon);
    if (areaCoords.length>1) areaPolyline=L.polyline([...areaCoords,areaCoords[0]],{color:'#7b1fa2',weight:2,dashArray:'6,4'}).addTo(map);
    if (areaCoords.length>2) { areaPolygon=L.polygon(areaCoords,{color:'#7b1fa2',weight:2,fillColor:'#ce93d8',fillOpacity:0.25}).addTo(map); showInfo('📐 '+formatArea(polyArea(areaCoords))+' — double-tapez pour terminer'); }
    else showInfo('📐 Tapez encore '+(3-areaCoords.length)+' point(s)');
  }
});

map.on('dblclick', e => {
  if (trackActive && trackMode === 'manual' && trackCoords.length >= 2) {
    stopTrack(); hideInfo();
  } else if (mode === 'area' && areaCoords.length > 2) {
    showToast('Superficie : '+formatArea(polyArea(areaCoords)));
    clearMeasure(); mode=null; updateBtns(); hideInfo();
  }
});

// POINT MODAL
function cancelPoint() {
  document.getElementById('point-modal').classList.remove('show');
  pendingPointLatLng = null;
}
function confirmPoint() {
  document.getElementById('point-modal').classList.remove('show');
  if (!pendingPointLatLng) return;
  const n = points.length+1;
  const name = document.getElementById('pt-name').value.trim() || ('Point '+n);
  const comment = document.getElementById('pt-comment').value.trim();
  points.push({id:n, name, comment, lat:pendingPointLatLng.lat, lng:pendingPointLatLng.lng, time:new Date().toLocaleString('fr-CA')});
  const icon = L.divIcon({
    html:'<div style="background:#e53935;color:white;border:2px solid white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.4)">'+n+'</div>',
    iconSize:[28,28], iconAnchor:[14,14]
  });
  const popupContent = '<b>'+name+'</b>'+(comment?'<br><i>'+comment+'</i>':'')+'<br><small>'+pendingPointLatLng.lat.toFixed(6)+', '+pendingPointLatLng.lng.toFixed(6)+'</small>';
  L.marker(pendingPointLatLng,{icon}).bindPopup(popupContent).addTo(map);
  const badge = document.getElementById('badge-point');
  badge.style.display='block'; badge.textContent=points.length;
  checkExport(); saveData();
  showToast(name+' épinglé');
  pendingPointLatLng = null;
}

// CLEAR MEASURE
function clearMeasure() {
  distCoords=[]; distMarkers.forEach(m=>map.removeLayer(m)); distMarkers=[];
  if (distPolyline){map.removeLayer(distPolyline);distPolyline=null;}
  areaCoords=[]; areaMarkers.forEach(m=>map.removeLayer(m)); areaMarkers=[];
  if (areaPolyline){map.removeLayer(areaPolyline);areaPolyline=null;}
  if (areaPolygon){map.removeLayer(areaPolygon);areaPolygon=null;}
  hideInfo();
}

// EXPORT GPX
function exportGPX() {
  let gpx = '<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="Carte forestière GFSD" xmlns="http://www.topografix.com/GPX/1/1">\n<metadata><name>Terrain</name></metadata>\n';
  points.forEach(p => {
    gpx += '<wpt lat="'+p.lat.toFixed(8)+'" lon="'+p.lng.toFixed(8)+'"><name>'+escXml(p.name)+'</name><desc>'+escXml(p.comment)+(p.comment?'\n':'')+'('+p.time+')</desc></wpt>\n';
  });
  tracks.forEach(t => {
    gpx += '<trk><name>'+escXml(t.name)+'</name>';
    if (t.comment) gpx += '<desc>'+escXml(t.comment)+'</desc>';
    gpx += '<trkseg>\n';
    t.coords.forEach(c => { gpx += '<trkpt lat="'+c[0].toFixed(8)+'" lon="'+c[1].toFixed(8)+'"></trkpt>\n'; });
    gpx += '</trkseg></trk>\n';
  });
  gpx += '</gpx>';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([gpx],{type:'application/gpx+xml'}));
  a.download = 'terrain_'+new Date().toISOString().slice(0,10)+'.gpx';
  a.click();
  showToast(points.length+' point(s), '+tracks.length+' ligne(s) exporté(s)');
}
function escXml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function checkExport() { document.getElementById('btn-export').disabled=(points.length===0&&tracks.length===0); }

// SAUVEGARDE LOCALE
function saveData() {
  try { localStorage.setItem('cf_points', JSON.stringify(points)); localStorage.setItem('cf_tracks', JSON.stringify(tracks)); } catch(e) {}
}

function loadData() {
  try {
    const savedPoints = JSON.parse(localStorage.getItem('cf_points') || '[]');
    const savedTracks = JSON.parse(localStorage.getItem('cf_tracks') || '[]');

    savedPoints.forEach(p => {
      points.push(p);
      const icon = L.divIcon({html:'<div style="background:#e53935;color:white;border:2px solid white;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,0.4)">'+p.id+'</div>',iconSize:[28,28],iconAnchor:[14,14]});
      const popup = '<b>'+p.name+'</b>'+(p.comment?'<br><i>'+p.comment+'</i>':'')+'<br><small>'+p.lat.toFixed(6)+', '+p.lng.toFixed(6)+'</small>';
      L.marker([p.lat,p.lng],{icon}).bindPopup(popup).addTo(map);
    });

    savedTracks.forEach(t => {
      tracks.push(t);
      L.polyline(t.coords,{color:'#e53935',weight:4,opacity:0.85})
        .bindPopup('<b>'+t.name+'</b>'+(t.comment?'<br><i>'+t.comment+'</i>':'')+'<br><small>'+formatDist(totalDist(t.coords))+'</small>')
        .addTo(map);
    });

    if (savedPoints.length > 0) {
      const badge = document.getElementById('badge-point');
      badge.style.display='block'; badge.textContent=savedPoints.length;
    }
    checkExport();
    if (savedPoints.length+savedTracks.length > 0)
      showToast(savedPoints.length+' point(s) et '+savedTracks.length+' ligne(s) rechargé(s)');
  } catch(e) {}
}

function clearAllData() {
  if (!confirm('Effacer tous les points et lignes sauvegardés?')) return;
  localStorage.removeItem('cf_points'); localStorage.removeItem('cf_tracks');
  showToast('Données effacées — rechargez la page');
}

// GEO MATH
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000,r=Math.PI/180,dLat=(lat2-lat1)*r,dLng=(lng2-lng1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function totalDist(coords){let d=0;for(let i=1;i<coords.length;i++)d+=haversine(coords[i-1][0],coords[i-1][1],coords[i][0],coords[i][1]);return d;}
function polyArea(coords){
  const R=6371000,r=Math.PI/180;
  const latC=coords.reduce((s,c)=>s+c[0],0)/coords.length*r;
  const pts=coords.map(c=>[c[1]*r*R*Math.cos(latC),c[0]*r*R]);
  let area=0;const n=pts.length;
  for(let i=0;i<n;i++){const j=(i+1)%n;area+=pts[i][0]*pts[j][1]-pts[j][0]*pts[i][1];}
  return Math.abs(area)/2/10000;
}
function formatDist(m){return m>=1000?(m/1000).toFixed(2)+' km':Math.round(m)+' m';}
function formatArea(ha){return ha>=1?ha.toFixed(2)+' ha':(ha*10000).toFixed(0)+' m²';}

function showInfo(txt){const el=document.getElementById('infobox');el.innerHTML=txt;el.style.display='block';}
function hideInfo(){document.getElementById('infobox').style.display='none';}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}

// DÉMARRAGE
loadData();
</script>
